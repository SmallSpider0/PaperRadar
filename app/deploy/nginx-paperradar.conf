# PaperRadar HTTPS reverse proxy
# UI:  https://example.com/paperradar
# API: https://example.com/paperradar-api/

location = /paperradar {
    try_files /paperradar/index.html =404;
}

location /paperradar/_next/ {
    alias /opt/paperradar/app/frontend/out/_next/;
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
}

location /paperradar-api/ {
    rewrite ^/paperradar-api/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:8100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
}

location /paperradar/ {
    alias /opt/paperradar/app/frontend/out/;
    try_files $uri $uri.html $uri/ /paperradar/index.html;
}
